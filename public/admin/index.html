<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>AS Creates | Secure Admin Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#1a1b22",
                        "on-tertiary-fixed": "#171c24",
                        "surface-container-high": "#e8e7f1",
                        "primary-fixed": "#dde1ff",
                        "surface-container": "#eeedf7",
                        "primary-container": "#3e55b1",
                        "primary": "#233c98",
                        "on-tertiary": "#ffffff",
                        "secondary": "#4b57aa",
                        "on-surface-variant": "#444652",
                        "on-primary": "#ffffff",
                        "error-container": "#ffdad6",
                        "primary-fixed-dim": "#b8c4ff",
                        "on-error": "#ffffff",
                        "surface-dim": "#dad9e3",
                        "surface-container-low": "#f4f2fd",
                        "secondary-container": "#99a5fe",
                        "tertiary-fixed": "#dfe2ee",
                        "surface": "#fbf8ff",
                        "inverse-surface": "#2f3037",
                        "secondary-fixed-dim": "#bcc3ff",
                        "error": "#ba1a1a",
                        "outline-variant": "#c5c5d4",
                        "surface-bright": "#fbf8ff",
                        "on-primary-fixed-variant": "#263e9a",
                        "inverse-on-surface": "#f1effa",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed-dim": "#c3c6d2",
                        "surface-variant": "#e3e1eb",
                        "on-tertiary-container": "#d1d5e0",
                        "surface-tint": "#4057b3",
                        "on-secondary-fixed": "#000d60",
                        "inverse-primary": "#b8c4ff",
                        "on-secondary-container": "#2b3789",
                        "tertiary-container": "#585c66",
                        "on-primary-fixed": "#001454",
                        "background": "#fbf8ff",
                        "surface-container-lowest": "#ffffff",
                        "on-surface": "#1a1b22",
                        "secondary-fixed": "#dfe0ff",
                        "on-error-container": "#93000a",
                        "surface-container-highest": "#e3e1eb",
                        "on-tertiary-fixed-variant": "#434750",
                        "outline": "#757683",
                        "tertiary": "#40454e",
                        "on-secondary-fixed-variant": "#323f91",
                        "on-primary-container": "#cbd3ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "grid-gutter": "24px",
                        "container-max": "1200px",
                        "base": "8px",
                        "section-gap-mobile": "64px",
                        "section-gap-desktop": "120px"
                    },
                    "fontFamily": {
                        "button": ["Hanken Grotesk"],
                        "body-md": ["Hanken Grotesk"],
                        "body-lg": ["Hanken Grotesk"],
                        "label-caps": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"],
                        "headline-sm": ["Hanken Grotesk"],
                        "headline-md": ["Hanken Grotesk"],
                        "display-lg-mobile": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "button": ["15px", {"lineHeight": "1", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "label-caps": ["14px", {"lineHeight": "1.2", "letterSpacing": "0.1em", "fontWeight": "700"}],
                        "display-lg": ["56px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-sm": ["24px", {"lineHeight": "1.4", "fontWeight": "600"}],
                        "headline-md": ["32px", {"lineHeight": "1.3", "fontWeight": "600"}],
                        "display-lg-mobile": ["36px", {"lineHeight": "1.2", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Hanken Grotesk', sans-serif;
            background-color: #fbf8ff;
            overflow-x: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .glass-panel {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(197, 197, 212, 0.5);
        }
        .hover-lift {
            transition: transform 0.2s cubic-bezier(0.33, 1, 0.68, 1), box-shadow 0.2s ease;
        }
        .hover-lift:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(35, 60, 152, 0.1);
        }
        .animated-ring {
            animation: rotate 60s linear infinite;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container opacity-0 transition-opacity duration-300">
    <!-- Atmospheric Background Layers -->
    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] rounded-full bg-primary-fixed-dim/20 blur-[120px]"></div>
        <div class="absolute bottom-[-10%] left-[-10%] w-[600px] h-[600px] rounded-full bg-secondary-fixed/20 blur-[120px]"></div>
        <!-- Subtle Rotating Ring Decoration -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] border border-outline-variant/20 rounded-full animated-ring hidden md:block">
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-4 h-4 bg-primary rounded-full"></div>
        </div>
    </div>
    
    <!-- Main Content Wrapper -->
    <main class="flex-grow flex items-center justify-center relative z-10 px-grid-gutter py-section-gap-mobile md:py-0">
        <!-- Login Card -->
        <div class="w-full max-w-[440px] glass-panel rounded-xl shadow-xl overflow-hidden relative group">
            <!-- Top hover border animation -->
            <div class="absolute top-0 left-0 w-0 h-1 bg-primary group-hover:w-full transition-all duration-500 ease-in-out"></div>
            
            <div class="p-8 md:p-10">
                <!-- Brand Header -->
                <div class="text-center mb-10">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-primary rounded-xl mb-4 shadow-lg shadow-primary/20">
                        <span class="material-symbols-outlined text-white text-[32px]" style="font-variation-settings: 'FILL' 1;">shield_person</span>
                    </div>
                    <h1 class="font-headline-md text-headline-md text-on-background tracking-tight">AS Creates</h1>
                    <p class="font-body-md text-body-md text-on-surface-variant mt-2">Administrative Control Center</p>
                </div>
                
                <!-- Error Alert -->
                <div id="loginStatus" style="display: none;" class="mb-6 p-4 bg-error-container text-on-error-container rounded-lg border border-error/20 text-center font-body-md text-[14px]">
                </div>
                
                <!-- Form -->
                <form class="space-y-6" id="loginForm">
                    <div class="space-y-1.5">
                        <label class="font-label-caps text-label-caps text-on-surface-variant block ml-1" for="email">Email Address</label>
                        <div class="relative group/input">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
                                <span class="material-symbols-outlined text-[20px]">alternate_email</span>
                            </div>
                            <input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-3 pl-10 pr-4 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all placeholder:text-outline/50" id="email" name="email" placeholder="admin@ascreates.com" required="" type="email">
                        </div>
                    </div>
                    
                    <div class="space-y-1.5">
                        <div class="flex justify-between items-center ml-1">
                            <label class="font-label-caps text-label-caps text-on-surface-variant" for="password">Password</label>
                        </div>
                        <div class="relative group/input">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
                                <span class="material-symbols-outlined text-[20px]">lock_open</span>
                            </div>
                            <input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-3 pl-10 pr-4 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all placeholder:text-outline/50" id="password" name="password" placeholder="••••••••" required="" type="password">
                            <button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-primary transition-colors" type="button" id="togglePasswordBtn">
                                <span class="material-symbols-outlined text-[20px]">visibility</span>
                            </button>
                        </div>
                    </div>
                    
                    <!-- Checkbox Removed -->
                    
                    <button class="w-full bg-primary text-on-primary font-button text-button py-4 rounded-lg shadow-lg shadow-primary/20 hover:bg-primary-container active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-2 group" type="submit" id="submitBtn">
                        Sign In to Dashboard
                        <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
                    </button>
                </form>
                
                <!-- Security Indicator with Green Pulse -->
                <div class="mt-8 flex items-center justify-center gap-2 text-emerald-600 dark:text-emerald-500 font-semibold">
                    <span class="material-symbols-outlined text-[18px] text-emerald-500 filled" style="font-variation-settings: 'FILL' 1;">verified_user</span>
                    <span class="font-label-caps text-[11px] tracking-widest uppercase">Secure Session Active</span>
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                </div>
            </div>
        </div>
    </main>
    
    <!-- Footer -->
    <footer class="relative z-10 w-full bg-on-background dark:bg-surface-container-lowest py-8">
        <div class="max-w-[1200px] mx-auto px-grid-gutter text-center">
            <div class="text-surface-variant dark:text-on-surface-variant font-body-md text-[13px] opacity-60">
                © 2026 AS Creates Digital Agency. All rights reserved.
            </div>
        </div>
    </footer>
    
    <!-- JavaScript logic -->
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Check if already authenticated
            try {
                const checkRes = await fetch('/api/admin/check-auth', { credentials: 'same-origin' });
                const checkResult = await checkRes.json();
                if (checkResult.authenticated) {
                    window.location.href = '/admin/dashboard';
                    return;
                }
            } catch (err) {
                console.error('Session check failed', err);
            }
            
            // Show body after authentication check to prevent flash of content
            document.body.classList.remove('opacity-0');

            const loginForm = document.getElementById('loginForm');
            const submitBtn = document.getElementById('submitBtn');
            const loginStatus = document.getElementById('loginStatus');
            const passInput = document.getElementById('password');
            const togglePassBtn = document.getElementById('togglePasswordBtn');

            // Micro-interactions for input scale
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    input.parentElement.classList.add('scale-[1.01]');
                });
                input.addEventListener('blur', () => {
                    input.parentElement.classList.remove('scale-[1.01]');
                });
            });

            // Password visibility toggle
            if (togglePassBtn && passInput) {
                togglePassBtn.addEventListener('click', () => {
                    const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passInput.setAttribute('type', type);
                    togglePassBtn.querySelector('span').textContent = type === 'password' ? 'visibility' : 'visibility_off';
                });
            }

            // Form Submit handler
            if (loginForm) {
                loginForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    loginStatus.style.display = 'none';
                    loginStatus.innerText = '';
                    submitBtn.disabled = true;
                    submitBtn.innerHTML = `Signing In... <span class="material-symbols-outlined animate-spin text-[18px]">sync</span>`;

                    const email = document.getElementById('email').value;
                    const password = passInput.value;

                    try {
                        const response = await fetch('/api/admin/login', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ email, password })
                        });

                        const result = await response.json();

                        if (response.ok && result.success) {
                            // Redirect to dashboard
                            loginStatus.style.display = 'block';
                            loginStatus.className = 'mb-6 p-4 bg-emerald-500/10 text-emerald-500 rounded-lg border border-emerald-500/20 text-center font-body-md text-[14px]';
                            loginStatus.innerText = 'Login successful! Redirecting...';
                            
                            // Set session storage flag to enforce tab-close logout
                            sessionStorage.setItem('admin_session_active', 'true');
                            
                            setTimeout(() => {
                                window.location.href = '/admin/dashboard';
                            }, 800);
                        } else {
                            throw new Error(result.error || 'Authentication failed. Please verify credentials.');
                        }
                    } catch (error) {
                        loginStatus.style.display = 'block';
                        loginStatus.className = 'mb-6 p-4 bg-red-500/10 text-red-500 rounded-lg border border-red-500/20 text-center font-body-md text-[14px]';
                        loginStatus.innerText = error.message;
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = `Sign In to Dashboard <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>`;
                    }
                });
            }
        });
    </script>
</body>
</html>
